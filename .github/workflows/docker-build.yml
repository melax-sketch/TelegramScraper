name: Docker Build & Deploy

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Lint with flake8
        continue-on-error: true
        run: |
          pip install flake8
          flake8 src/ main.py --count --select=E9,F63,F7,F82 --show-source --statistics
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false
          tags: telegram-scraper:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
  
  test:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Test configuration
        run: |
          python -c "from src.config import Config; print('Config loaded successfully');"
          python -c "from src.logger import logger; print('Logger initialized');"
          python -c "from src.ui import UI; print('UI module loaded');"
